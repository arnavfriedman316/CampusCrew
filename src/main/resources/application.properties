# ===============================
# 🌍 SERVER CONFIGURATION
# ===============================
# We set this to 8081 to match your previous logs
server.port=8081

# ===============================
# 🗄️ NEON POSTGRESQL DATABASE
# ===============================
# The colon after the variable name tells Spring Boot to look 
# for the Environment Variable in Render's dashboard.
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# ⚙️ HIBERNATE / JPA SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# This helps Hibernate choose the right SQL dialect for Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 🎨 THYMELEAF SETTINGS
# ===============================
spring.thymeleaf.cache=false

# ===============================
# 🔐 GOOGLE OAUTH2 CONFIGURATION
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email