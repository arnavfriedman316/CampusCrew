# ===============================
# ☁️ CLOUD DATABASE CONFIGURATION (Neon PostgreSQL)
# ===============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 🛠️ HIBERNATE / JPA CONFIGURATION
# ===============================
# Automatically update the database schema based on your Java entities
spring.jpa.hibernate.ddl-auto=update

# Tell Hibernate to speak PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL queries in the terminal (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 🌐 SERVER CONFIGURATION
# ===============================
server.port=8081