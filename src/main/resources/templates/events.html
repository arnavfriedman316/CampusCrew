<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Events - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>

    <style>
        body { overflow-x: hidden; }
        .event-card {
            border-radius: 15px;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
        }
        
        /* 🌙 Dark Mode Overrides */
        [data-bs-theme="dark"] .event-card {
            background-color: #2b3035;
            border: 1px solid #495057;
        }
        [data-bs-theme="dark"] .form-control {
            background-color: #212529;
            border-color: #495057;
            color: #fff;
        }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-5 mb-5">

    <div class="row align-items-center mb-4 pb-3 border-bottom border-secondary-subtle">
        <div class="col-md-4 text-start">
            <h1 class="m-0 fw-bold">📅 Campus Events</h1>
        </div>
        
        <div class="col-md-4">
            <form th:action="@{/events}" method="get" class="d-flex shadow-sm">
                <input class="form-control me-2 rounded-pill" type="search" name="keyword" th:value="${keyword}" placeholder="Search events..." aria-label="Search">
                <button class="btn btn-primary rounded-pill px-4" type="submit">Search</button>
            </form>
        </div>

        <div class="col-md-4 d-flex justify-content-end align-items-center mt-3 mt-md-0">
            <a href="/" class="btn btn-outline-secondary shadow-sm px-4">Dashboard</a>
            <button class="btn btn-dark ms-3 shadow-sm" id="darkModeToggle" title="Toggle Dark Mode">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row g-4 d-flex align-items-start">
        
        <div class="col-lg-4 sticky-lg-top" style="top: 20px; z-index: 1;" sec:authorize="hasAnyAuthority('ROLE_SUPER_ADMIN', 'ROLE_PRESIDENT')">
            <div class="card shadow-sm p-4" style="border-radius: 15px;">
                <h4 class="fw-bold mb-4 text-primary">Post a New Event ✨</h4>
                <form th:action="@{/events}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Event Title</label>
                        <input type="text" class="form-control shadow-sm" name="title" required placeholder="e.g. Spring Hackathon">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Date & Time</label>
                    <input type="datetime-local" class="form-control shadow-sm" name="dateTime" required>                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Location</label>
                        <input type="text" class="form-control shadow-sm" name="location" required placeholder="e.g. Main Auditorium">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Description</label>
                        <textarea class="form-control shadow-sm" name="description" rows="3" required placeholder="What is this event about?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm rounded-pill py-2">Publish Event</button>
                </form>
            </div>
        </div>

        <div class="col">
            
            <div th:if="${events.empty}" class="text-center py-5">
                <h3 class="text-secondary fw-bold">No events found! 🏜️</h3>
                <p class="text-muted">Try adjusting your search or check back later.</p>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                <div class="col" th:each="event : ${events}">
                    <div class="card event-card h-100 p-3">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold text-primary mb-2" th:text="${event.title}">Event Title</h5>
                            
                            <p class="card-text mb-1 text-secondary">
                                📍 <span th:text="${event.location}">Location</span>
                            </p>
                            <p class="card-text mb-3 text-secondary">
                            🕒 <span th:text="${event.dateTime}">Date</span>                            
                            </p>    
                            <p class="card-text flex-grow-1" th:text="${event.description}">Event description goes here.</p>
                            
                            <form th:action="@{/events/{id}/register(id=${event.id})}" method="post" class="mt-3">
                                <button type="submit" class="btn btn-outline-primary w-100 fw-bold rounded-pill shadow-sm">Register Now</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');

        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
            }
        }
    });
</script>

</body>
</html>
