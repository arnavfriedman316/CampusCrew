<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Club Management - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>

    <style>
        body { overflow-x: hidden; }
        .club-card {
            border-radius: 15px;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            background-color: var(--bs-body-bg);
        }
        .club-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
        }
        
        /* 🌙 Dark Mode Overrides */
        [data-bs-theme="dark"] .club-card {
            background-color: #2b3035;
        }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-5 mb-5">
    
    <div class="row align-items-center mb-4 pb-3 border-bottom border-secondary-subtle">
        <div class="col-md-6 text-start">
            <h1 class="m-0 fw-bold">🏛️ Club Headquarters</h1>
            <p class="text-muted mb-0 mt-1">Manage university organizations and their color themes.</p>
        </div>
        <div class="col-md-6 d-flex justify-content-end align-items-center mt-3 mt-md-0">
            <a href="/admin" sec:authorize="hasAuthority('ROLE_SUPER_ADMIN')" class="btn btn-outline-primary shadow-sm px-4">Admin Panel</a>
            <a href="/events" class="btn btn-outline-secondary shadow-sm px-4 ms-2">Go to Events</a>
            <button class="btn btn-dark ms-3 shadow-sm" id="darkModeToggle" title="Toggle Dark Mode">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4 d-flex align-items-start">
        
        <div class="col-lg-4 sticky-lg-top" style="top: 20px; z-index: 1;" sec:authorize="hasAuthority('ROLE_SUPER_ADMIN')">
            <div class="card shadow-sm p-4 border-0" style="border-radius: 15px; border-top: 5px solid #0d6efd !important;">
                <h4 class="fw-bold mb-4 text-primary">Forge a New Club 🔨</h4>
                <form th:action="@{/clubs/create}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Official Club Name</label>
                        <input type="text" class="form-control shadow-sm" name="name" required placeholder="e.g. Swaragini">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Theme Color</label>
                        <input type="color" class="form-control form-control-color w-100 shadow-sm" name="themeColor" value="#0d6efd" required title="Choose your club color">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">Description</label>
                        <textarea class="form-control shadow-sm" name="description" rows="3" required placeholder="What does this club do?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm rounded-pill py-2">Create Club</button>
                </form>
            </div>
        </div>

        <div th:class="${#authorization.expression('hasAuthority(''ROLE_SUPER_ADMIN'')')} ? 'col-lg-8' : 'col-12'">
            
            <div th:if="${clubs.empty}" class="text-center py-5">
                <h3 class="text-secondary fw-bold">No clubs founded yet! 🏛️</h3>
                <p class="text-muted">A Super Admin needs to forge the first club.</p>
            </div>

            <div class="row row-cols-1 row-cols-md-2 g-4">
                <div class="col" th:each="club : ${clubs}">
                    
                    <div class="card club-card shadow-sm h-100 border-0" th:style="'border-top: 5px solid ' + ${club.themeColor} + ' !important;'">
                        <div class="card-body p-4">
                            <h4 class="card-title fw-bold mb-3" th:style="'color: ' + ${club.themeColor} + ';'" th:text="${club.name}">Club Name</h4>
                            <p class="card-text text-secondary flex-grow-1" th:text="${club.description}">Description</p>
                            
                            <div class="mt-4 pt-3 border-top border-secondary-subtle">
                                <form th:action="@{/clubs/edit/{id}(id=${club.id})}" method="post">
                                    <label class="form-label small fw-bold text-muted">Update Theme & Info</label>
                                    <div class="d-flex mb-2">
                                        <input type="color" class="form-control form-control-color me-2 shadow-sm" name="themeColor" th:value="${club.themeColor}" title="Change theme color">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary w-100 shadow-sm rounded-pill fw-bold">Save Edits</button>
                                    </div>
                                    <textarea class="form-control form-control-sm shadow-sm" name="description" rows="2" th:text="${club.description}"></textarea>
                                </form>
                            </div>
                            
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');

        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
            }
        }
    });
</script>

</body>
</html>
