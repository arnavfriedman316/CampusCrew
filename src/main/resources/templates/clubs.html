<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Manage Clubs - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
</head>
<body class="bg-body">

<div class="container mt-4 mb-5">
    
    <div class="bento-grid">
        
        <!-- Header Block -->
        <div class="bento-item span-4 d-flex flex-column flex-md-row justify-content-between align-items-center" style="background-color: var(--accent-red) !important; color: white !important;">
            <div class="text-start">
                <h2 class="m-0 fw-bold" style="color: white !important;">🛡️ MANAGE CLUBS</h2>
                <p class="mb-0 fw-bold" style="opacity: 0.9;">Create and organize student organizations.</p>
            </div>
            
            <div class="d-flex flex-wrap justify-content-center align-items-center gap-2 mt-3 mt-md-0">
                <a href="/events" class="btn btn-warning fw-bold py-2 px-4 shadow-none text-dark">DASHBOARD &rarr;</a>
                <a sec:authorize="hasAuthority('ROLE_SUPER_ADMIN')" href="/admin" class="btn btn-dark fw-bold py-2 px-4 shadow-none">⚙️ ADMIN</a>
                <button class="btn btn-dark shadow-none d-flex align-items-center justify-content-center p-0" id="darkModeToggle" title="Toggle Dark Mode" style="width: 50px; height: 50px; font-size: 1.2rem;">🌙</button>
            </div>
        </div>

        <!-- Alerts -->
        <div class="bento-item span-4 py-3 bg-success text-dark p-3" th:if="${success}" style="background-color: var(--accent-green) !important;">
            <div class="d-flex justify-content-between align-items-center">
                <strong th:text="${success}">Success!</strong>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert"></button>
            </div>
        </div>
        <div class="bento-item span-4 py-3 bg-danger text-white p-3" th:if="${error}" style="background-color: var(--accent-red) !important;">
            <div class="d-flex justify-content-between align-items-center">
                <strong th:text="${error}">Error!</strong>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <!-- Create Club Form -->
        <div class="bento-item span-1 h-100 d-flex flex-column justify-content-start" style="background-color: var(--bg-cream);">
            <h4 class="fw-bold fs-4 mb-4" style="font-family: 'Syne', sans-serif;">➕ NEW CLUB</h4>
            <form th:action="@{/clubs/create}" method="post" enctype="multipart/form-data" class="d-flex flex-column gap-3">
                
                <div>
                    <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Club Name</label>
                    <input type="text" class="form-control rounded-0 shadow-none border-2" name="name" required placeholder="e.g. Coding Club" style="border-color: var(--border-dark); background-color: var(--bg-cream); color: var(--border-dark);">
                </div>
                
                <div>
                    <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Club Logo</label>
                    <input type="file" class="form-control rounded-0 shadow-none border-2" name="logoImage" accept="image/*" style="border-color: var(--border-dark); background-color: var(--bg-cream); color: var(--border-dark);">
                </div>
                
                <div>
                    <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Brand Color</label>
                    <div class="d-flex align-items-center gap-2">
                        <input type="color" class="form-control form-control-color p-1 rounded-0 shadow-none border-2" name="themeColor" value="#3366FF" title="Choose color" required style="border-color: var(--border-dark);">
                        <span class="small fw-bold" style="opacity: 0.7;">Select a HEX</span>
                    </div>
                </div>
                
                <div>
                    <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Description</label>
                    <textarea class="form-control rounded-0 shadow-none border-2" name="description" rows="4" required placeholder="What does this club do?" style="border-color: var(--border-dark); background-color: var(--bg-cream); color: var(--border-dark);"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary fw-bold rounded-0 shadow-none mt-3" style="border: 2px solid var(--border-dark); border-bottom-width: 4px; border-right-width: 4px;">CREATE CLUB</button>
            </form>
        </div>

        <!-- Clubs Table -->
        <div class="bento-item span-3 p-0 overflow-hidden" style="display: flex; flex-direction: column; background-color: var(--bg-cream);">
            
            <div class="p-3 border-bottom" style="border-color: var(--border-dark) !important;">
                <span class="fw-bold fs-4" style="font-family: 'Syne', sans-serif;">DIRECTORY</span>
            </div>
            
            <div class="table-responsive bg-transparent" style="flex-grow: 1;">
                <table class="table align-middle mb-0" style="--bs-table-bg: transparent; --bs-table-color: inherit; border-color: var(--border-dark);">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-dark);">
                            <th class="px-4 py-3 fw-bold text-uppercase">Club</th>
                            <th class="py-3 fw-bold text-uppercase">Mission</th>
                            <th class="py-3 text-center fw-bold text-uppercase">Events</th>
                            <th class="px-4 py-3 text-end fw-bold text-uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${clubs == null or clubs.empty}">
                            <td colspan="4" class="text-center py-5 fw-bold" style="opacity: 0.5;">No clubs exist yet. The campus is quiet.</td>
                        </tr>
                        
                        <tr th:each="club : ${clubs}" style="border-bottom: 1px solid var(--border-dark);">
                            <td class="px-4 fw-bold">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="d-flex align-items-center justify-content-center" 
                                         th:style="'width: 40px; height: 40px; border: 2px solid var(--border-dark); background-color: ' + ${club.themeColor} + ';'">
                                         <img th:if="${club.logoData != null}" th:src="@{/clubs/{id}/logo(id=${club.id})}" class="w-100 h-100 object-fit-cover" alt="Logo">
                                         <!-- Fallback pattern if no logo -->
                                         <div th:unless="${club.logoData != null}" class="w-100 h-100" style="background: repeating-linear-gradient(45deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 5px, transparent 5px, transparent 10px);"></div>
                                    </div>
                                    <span th:text="${club.name}" style="font-size: 1.1rem;">Club Name</span>
                                </div>
                            </td>
                            
                            <td class="text-secondary small d-inline-block text-truncate mt-3" style="max-width: 250px; font-weight: 500; color: inherit;" th:text="${club.description}">
                                Club description goes here...
                            </td>
                            
                            <td class="text-center">
                                <span class="badge rounded-0 fs-6 fw-bold border" style="border-color: var(--border-dark) !important; background-color: var(--border-dark); color: var(--bg-cream);" th:text="${club.events != null ? club.events.size() : 0}">0</span>
                            </td>
                            
                            <td class="px-4 text-end">
                                <form th:action="@{/clubs/{id}/delete(id=${club.id})}" method="post" class="m-0" onsubmit="return confirm('⚠️ Are you sure? Deleting this club will irrevocably delete ALL associated events/tickets!');">
                                    <button type="submit" class="btn btn-outline-danger btn-sm fw-bold rounded-0 shadow-none px-3" style="border-width: 2px;">
                                        DELETE
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    });
</script>

</body>
</html>
