<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Manage Clubs - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
    <style>
        [data-bs-theme="dark"] .card { background-color: #2b3035; border-color: #495057 !important; }
        [data-bs-theme="dark"] .form-control { background-color: #212529; border-color: #495057; color: #fff; }
        [data-bs-theme="dark"] .table { --bs-table-bg: transparent; --bs-table-color: #f8f9fa; border-color: #495057; }
        [data-bs-theme="dark"] .table-hover>tbody>tr:hover>* { --bs-table-bg-state: rgba(255,255,255,0.05); color: #fff; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-4 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle gap-3">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold text-warning text-dark">🛡️ Manage Clubs</h2>
            <p class="text-muted mb-0 small">Create and organize student organizations.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/events" class="btn btn-primary btn-sm shadow-sm px-3 rounded-pill fw-bold">📅 Events</a>
            <a sec:authorize="hasAuthority('ROLE_SUPER_ADMIN')" href="/admin" class="btn btn-danger btn-sm shadow-sm px-3 rounded-pill fw-bold">⚙️ Admin</a>
            <a href="/" class="btn btn-outline-secondary btn-sm shadow-sm px-3 rounded-pill">Dashboard</a>
            <button class="btn btn-dark shadow-sm rounded-circle d-flex align-items-center justify-content-center" id="darkModeToggle" title="Toggle Dark Mode" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4 d-flex align-items-start">
        
        <div class="col-12 col-lg-4 sticky-lg-top" style="top: 20px; z-index: 1;">
            <div class="card shadow-sm border-0 p-3 p-md-4" style="border-radius: 15px;">
                <h5 class="fw-bold mb-4 text-primary">➕ Create New Club</h5>
                <form th:action="@{/clubs}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Club Name</label>
                        <input type="text" class="form-control shadow-sm" name="name" required placeholder="e.g. Coding Club">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Theme Color</label>
                        <div class="d-flex align-items-center gap-2">
                            <input type="color" class="form-control form-control-color shadow-sm" name="themeColor" value="#0d6efd" title="Choose your color" required>
                            <span class="small text-muted">Pick a brand color</span>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Description</label>
                        <textarea class="form-control shadow-sm" name="description" rows="3" required placeholder="What does this club do?"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm rounded-pill">Create Club</button>
                </form>
            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 text-nowrap">
                        <thead class="table-dark">
                            <tr>
                                <th class="px-4 py-3">Club Name</th>
                                <th class="py-3">Description</th>
                                <th class="py-3 text-center">Events</th>
                                <th class="px-4 py-3 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${clubs == null or clubs.empty}">
                                <td colspan="4" class="text-center py-5 text-muted fw-bold">No clubs created yet. Be the first!</td>
                            </tr>
                            
                            <tr th:each="club : ${clubs}">
                                <td class="px-4 fw-bold">
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="rounded-circle shadow-sm border border-light" 
                                             th:style="'width: 15px; height: 15px; background-color: ' + ${club.themeColor} + ';'"></div>
                                        <span th:text="${club.name}">Club Name</span>
                                    </div>
                                </td>
                                
                                <td class="text-secondary small d-inline-block text-truncate mt-2" style="max-width: 200px;" th:text="${club.description}">
                                    Club description goes here...
                                </td>
                                
                                <td class="text-center">
                                    <span class="badge bg-secondary rounded-pill" th:text="${club.events != null ? club.events.size() : 0}">0</span>
                                </td>
                                
                                <td class="px-4 text-end">
                                    <form th:action="@{/clubs/{id}/delete(id=${club.id})}" method="post" class="m-0" onsubmit="return confirm('Are you sure? Deleting this club will also delete all of its events!');">
                                        <button type="submit" class="btn btn-danger btn-sm fw-bold rounded shadow-sm px-3">
                                            🗑️ Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    });
</script>

</body>
</html>
