<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>My Profile - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
    <style>
        [data-bs-theme="dark"] .card { background-color: #2b3035; border-color: #495057 !important; }
        [data-bs-theme="dark"] .text-secondary { color: #adb5bd !important; }
        [data-bs-theme="dark"] .bg-white { background-color: #212529 !important; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-4 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle gap-3">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold text-primary">👤 My Profile</h2>
            <p class="text-muted mb-0 small">Manage your account details.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/my-events" class="btn btn-success btn-sm shadow-sm px-3 rounded-pill fw-bold">🎫 My Tickets</a>
            <a href="/" class="btn btn-outline-secondary btn-sm shadow-sm px-3 rounded-pill">Dashboard</a>
            <button class="btn btn-dark shadow-sm rounded-circle d-flex align-items-center justify-content-center" id="darkModeToggle" title="Toggle Dark Mode" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div class="row justify-content-center mt-5">
        <div class="col-12 col-md-8 col-lg-5">
            
            <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
                <div class="bg-primary bg-gradient" style="height: 100px;"></div>
                
                <div class="card-body px-4 pb-4 text-center" style="margin-top: -60px;">
                    
                    <img th:src="${user.profilePhotoUrl != null and !user.profilePhotoUrl.isEmpty() ? user.profilePhotoUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=150'}" 
                         alt="Profile Avatar" 
                         class="rounded-circle shadow-sm object-fit-cover border border-4 border-light bg-white mb-3" 
                         style="width: 120px; height: 120px;">
                    
                    <h3 class="fw-bold mb-1" th:text="${user.fullName}">User Full Name</h3>
                    <p class="text-secondary mb-3" th:text="${user.email}">user@student.edu</p>
                    
                    <div class="mb-4">
                        <span th:if="${user.role == 'ROLE_USER'}" class="badge bg-secondary rounded-pill px-3 py-2 shadow-sm">🎓 Student User</span>
                        <span th:if="${user.role == 'ROLE_PRESIDENT'}" class="badge bg-warning text-dark rounded-pill px-3 py-2 shadow-sm">👑 Club President</span>
                        <span th:if="${user.role == 'ROLE_SUPER_ADMIN'}" class="badge bg-danger rounded-pill px-3 py-2 shadow-sm">⚙️ Super Admin</span>
                    </div>

                    <hr class="text-secondary opacity-25 mb-4">
                    
                    <div class="d-flex flex-column gap-2">
                        <a href="/profile/edit" class="btn btn-primary fw-bold rounded-pill shadow-sm py-2">
                            ✏️ Edit Profile
                        </a>
                        <a sec:authorize="hasAnyAuthority('ROLE_SUPER_ADMIN', 'ROLE_PRESIDENT')" href="/clubs" class="btn btn-outline-warning fw-bold text-dark dark-text-light rounded-pill shadow-sm py-2">
                            🛡️ Manage Organizations
                        </a>
                    </div>
                    
                </div>
            </div>
            
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
                document.querySelectorAll('.dark-text-light').forEach(el => el.classList.replace('text-dark', 'text-light'));
                document.querySelectorAll('.border-light').forEach(el => el.classList.replace('border-light', 'border-dark'));
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
                document.querySelectorAll('.dark-text-light').forEach(el => el.classList.replace('text-light', 'text-dark'));
                document.querySelectorAll('.border-dark').forEach(el => el.classList.replace('border-dark', 'border-light'));
            }
        }
    });
</script>

</body>
</html>
