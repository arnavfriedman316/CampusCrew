<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>My Tickets - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
    <style>
        .ticket-card {
            border-radius: 15px;
            border: 1px dashed rgba(0,0,0,0.2) !important;
            transition: transform 0.2s ease;
        }
        .ticket-card:hover {
            transform: translateY(-5px);
        }
        [data-bs-theme="dark"] .ticket-card, [data-bs-theme="dark"] .modal-content {
            background-color: #2b3035;
            border-color: #495057 !important;
        }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-4 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle gap-3">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold text-success">🎫 My Tickets</h2>
            <p class="text-muted mb-0 small">Events you are registered to attend.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/events" class="btn btn-primary btn-sm shadow-sm px-3 rounded-pill fw-bold">📅 Browse Events</a>
            <a href="/" class="btn btn-outline-secondary btn-sm shadow-sm px-3 rounded-pill fw-bold">Dashboard</a>
            <button class="btn btn-dark shadow-sm rounded-circle d-flex align-items-center justify-content-center" id="darkModeToggle" title="Toggle Dark Mode" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3 text-center" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3 text-center" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${events == null or events.empty}" class="text-center py-5 mt-4">
        <h1 class="display-1 text-muted mb-3 opacity-50">🎫</h1>
        <h3 class="text-secondary fw-bold">No tickets yet!</h3>
        <p class="text-muted mb-4">Head over to the Events page to find something fun to do.</p>
        <a href="/events" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm btn-lg">Find Events</a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:if="${events != null and !events.empty}">
        
        <div class="col" th:each="event : ${events}">
            <div class="card ticket-card h-100 p-3 shadow-sm bg-body" 
                 th:style="'border-top: 6px solid ' + (${event.club != null ? event.club.themeColor : '#198754'}) + ' !important;'">
                
                <div class="card-body d-flex flex-column p-2">
                    
                    <div class="mb-2 text-center text-md-start">
                        <span class="badge rounded-pill shadow-sm py-1 px-3"
                              th:style="'background-color: ' + (${event.club != null ? event.club.themeColor : '#198754'}) + ';'"
                              th:text="${event.club != null ? event.club.name : 'General Event'}">Club Name</span>
                    </div>
                    
                    <h5 class="card-title fw-bold mb-3 mt-1 text-center text-md-start" 
                        th:style="'color: ' + (${event.club != null ? event.club.themeColor : '#198754'}) + ';'" 
                        th:text="${event.title}">Event Title</h5>
                    
                    <p class="card-text mb-1 text-secondary small text-center text-md-start">📍 <span th:text="${event.location}">Location</span></p>
                    <p class="card-text mb-3 text-secondary small text-center text-md-start">🕒 <span th:text="${event.dateTime}">Date</span></p>
                    
                    <div class="mt-auto pt-3 border-top border-secondary-subtle">
                         
                         <button class="btn btn-light border border-secondary-subtle w-100 fw-bold rounded-pill shadow-sm mb-2 small text-dark"
                                data-bs-toggle="modal" 
                                th:data-bs-target="'#ticketModal' + ${event.id}">
                            📱 View My QR Pass
                        </button>
                        
                        <form th:action="@{/events/{id}/cancel(id=${event.id})}" method="post" class="m-0" onsubmit="return confirm('Are you sure you want to cancel your ticket? You will lose your spot!');">
                            <button type="submit" class="btn btn-outline-danger w-100 fw-bold rounded-pill shadow-sm small">Cancel Ticket</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="modal fade" th:id="'ticketModal' + ${event.id}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-sm modal-dialog-centered">
                    <div class="modal-content shadow-lg border-0" style="border-radius: 20px;">
                        
                        <div class="modal-header border-bottom-0 pb-0 d-flex justify-content-center">
                            <h5 class="modal-title fw-bold text-dark dark-text-light">🎟️ My Entry Pass</h5>
                        </div>
                        
                        <div class="modal-body text-center pb-4">
                            <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=user:' + ${#authentication.name} + ',event:' + ${event.id}" 
                                 alt="My Ticket QR" class="img-fluid mx-auto mb-3 shadow-sm rounded border p-2 bg-white">
                            
                            <p class="fw-bold text-primary mb-1" th:text="${event.title}">Event Title</p>
                            <p class="small text-muted mb-0" th:text="${event.dateTime}">Date</p>
                            <hr class="my-3">
                            <p class="small fw-bold text-secondary mb-0">Show this code at the door!</p>
                        </div>
                        
                        <div class="modal-footer border-top-0 pt-0 justify-content-center">
                            <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
                        </div>
                        
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
                document.querySelectorAll('.dark-text-light').forEach(el => el.classList.replace('text-dark', 'text-light'));
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
                document.querySelectorAll('.dark-text-light').forEach(el => el.classList.replace('text-light', 'text-dark'));
            }
        }
    });
</script>

</body>
</html>
