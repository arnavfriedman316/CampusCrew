<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>My Tickets - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
</head>
<body class="bg-body">

<div class="container mt-4 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom gap-3" style="border-color: var(--border-dark) !important;">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold" style="color: var(--accent-green);">My Tickets</h2>
            <p class="mb-0 fw-bold" style="opacity: 0.9;">Events you are registered to attend.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/events" class="btn btn-primary btn-sm px-3 fw-bold">Browse Events</a>
            <a href="/" class="btn btn-outline-secondary btn-sm px-3 fw-bold">Dashboard</a>
            <button class="btn btn-dark d-flex align-items-center justify-content-center p-0" id="darkModeToggle" title="Toggle Dark Mode" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show text-center" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show text-center" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${events == null or events.empty}" class="text-center py-5 mt-4">
        <h1 class="display-1 mb-3 opacity-50">🎫</h1>
        <h3 class="fw-bold">No tickets yet!</h3>
        <p class="mb-4" style="opacity: 0.8;">Head over to the Events page to find something fun to do.</p>
        <a href="/events" class="btn btn-primary px-4 fw-bold btn-lg">Find Events</a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:if="${events != null and !events.empty}">
        
        <div class="col" th:each="event : ${events}">
            <div class="card h-100 p-3" 
                 th:style="'border-top-width: 6px !important; border-top-color: ' + (${event.club != null ? event.club.themeColor : 'var(--accent-green)'}) + ' !important;'">
                
                <div class="card-body d-flex flex-column p-2">
                    
                    <div class="mb-2 text-center text-md-start">
                        <span class="badge py-1 px-3 text-dark"
                              th:style="'background-color: ' + (${event.club != null ? event.club.themeColor : 'var(--accent-green)'}) + ';'"
                              th:text="${event.club != null ? event.club.name : 'General Event'}">Club Name</span>
                    </div>
                    
                    <h5 class="card-title fw-bold mb-3 mt-1 text-center text-md-start" 
                        style="font-family: 'Syne', sans-serif;"
                        th:text="${event.title}">Event Title</h5>
                    
                    <p class="card-text mb-1 small text-center text-md-start" style="opacity: 0.8;">📍 <span th:text="${event.location}">Location</span></p>
                    <p class="card-text mb-3 small text-center text-md-start" style="opacity: 0.8;">🕒 <span th:text="${#temporals.format(event.dateTime, 'dd-MM-yy HH:mm')}">Date</span></p>
                    
                    <div class="mt-auto pt-3 border-top" style="border-color: var(--border-dark) !important;">
                         
                         <button class="btn btn-light w-100 fw-bold mb-2 text-dark"
                                data-bs-toggle="modal" 
                                th:data-bs-target="'#ticketModal' + ${event.id}">
                            View My QR Pass
                        </button>
                        
                        <form th:action="@{/events/{id}/cancel(id=${event.id})}" method="post" class="m-0" onsubmit="return confirm('Are you sure you want to cancel your ticket? You will lose your spot!');">
                            <button type="submit" class="btn btn-outline-danger w-100 fw-bold">Cancel Ticket</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="modal fade" th:id="'ticketModal' + ${event.id}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-sm modal-dialog-centered">
                    <div class="modal-content">
                        
                        <div class="modal-header border-bottom-0 pb-0 d-flex justify-content-center">
                            <h5 class="modal-title fw-bold">MY ENTRY PASS</h5>
                        </div>
                        
                        <div class="modal-body text-center pb-4">
                            <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=user:' + ${#authentication.name} + ',event:' + ${event.id}" 
                                 alt="My Ticket QR" class="img-fluid mx-auto mb-3 shadow rounded border p-2 bg-white">
                            
                            <p class="fw-bold mb-1" th:text="${event.title}" style="color: var(--accent-blue);">Event Title</p>
                            <p class="small mb-0" style="opacity: 0.8;" th:text="${#temporals.format(event.dateTime, 'dd-MM-yy HH:mm')}">Date</p>
                            <hr class="my-3" style="border-color: var(--border-dark);">
                            <p class="small fw-bold mb-0">Show this code at the door!</p>
                        </div>
                        
                        <div class="modal-footer border-top-0 pt-0 justify-content-center">
                            <button type="button" class="btn btn-dark px-4" data-bs-dismiss="modal">CLOSE</button>
                        </div>
                        
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
                document.querySelectorAll('.dark-text-light').forEach(el => el.classList.replace('text-dark', 'text-light'));
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
                document.querySelectorAll('.dark-text-light').forEach(el => el.classList.replace('text-light', 'text-dark'));
            }
        }
    });
</script>

</body>
</html>
