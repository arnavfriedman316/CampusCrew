<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Tickets - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    <style>
        .ticket-card { border-radius: 15px; border: 1px dashed #6c757d; }
        [data-bs-theme="dark"] .ticket-card { background-color: #2b3035; border-color: #495057; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-5 mb-5">
    <div class="row align-items-center mb-4 pb-3 border-bottom border-secondary-subtle">
        <div class="col-md-6">
            <h1 class="m-0 fw-bold">🎫 My Tickets</h1>
            <p class="text-muted mb-0">Events you are registered to attend.</p>
        </div>
        <div class="col-md-6 text-end">
            <a href="/events" class="btn btn-primary shadow-sm px-4 me-2">Browse All Events</a>
            <a href="/" class="btn btn-outline-secondary shadow-sm px-4">Dashboard</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${events.empty}" class="text-center py-5">
        <h3 class="text-secondary fw-bold">No tickets yet! 🎟️</h3>
        <p class="text-muted">Head over to the Events page to find something fun to do.</p>
        <a href="/events" class="btn btn-primary rounded-pill mt-3 px-4">Find Events</a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
        <div class="col" th:each="event : ${events}">
            <div class="card ticket-card h-100 p-3 shadow-sm" th:style="'border-top: 5px solid ' + (${event.club != null ? event.club.themeColor : '#0d6efd'}) + ' !important;'">
                <div class="card-body d-flex flex-column">
                    <div class="mb-2">
                        <span class="badge rounded-pill shadow-sm py-1 px-3"
                              th:style="'background-color: ' + (${event.club != null ? event.club.themeColor : '#0d6efd'}) + ';'"
                              th:text="${event.club != null ? event.club.name : 'General'}">Club</span>
                    </div>
                    <h5 class="card-title fw-bold mb-3 mt-1" th:text="${event.title}">Event Title</h5>
                    <p class="card-text mb-1 text-secondary">📍 <span th:text="${event.location}">Location</span></p>
                    <p class="card-text mb-3 text-secondary">🕒 <span th:text="${event.dateTime}">Date</span></p>
                    
                    <div class="mt-auto pt-3 border-top">
                        <form th:action="@{/events/{id}/cancel(id=${event.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-outline-danger w-100 fw-bold rounded-pill shadow-sm">Cancel Registration</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
