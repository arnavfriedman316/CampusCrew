<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body class="bg-body d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 2rem 0;">

<div class="container px-3">
    <div class="card mx-auto p-4 p-md-5" style="max-width: 400px; width: 100%;">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold fs-2" style="font-family: 'Syne', sans-serif; text-transform: uppercase;">CampusCrew</h2>
            <p class="fw-bold" style="opacity: 0.8;">Join the community. Create an account.</p>
        </div>
        
        <div th:if="${error}" class="alert alert-danger text-center py-2">
            <small class="fw-bold" th:text="${error}">Error message</small>
        </div>
        <div th:if="${success}" class="alert alert-success text-center py-2">
            <small class="fw-bold" th:text="${success}">Success message</small>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Full Name</label>
                <input type="text" class="form-control form-control-lg" name="fullName" required placeholder="e.g. Jane Doe">
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Email Address</label>
                <input type="email" class="form-control form-control-lg" name="email" required placeholder="student@campus.edu">
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="color: var(--border-dark);">Password</label>
                <input type="password" class="form-control form-control-lg" name="password" required placeholder="Create a strong password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">SIGN UP</button>
        </form>

        <div class="d-flex align-items-center my-4">
            <hr class="flex-grow-1" style="opacity: 1;">
            <span class="mx-3 small fw-bold" style="color: var(--border-dark);">OR</span>
            <hr class="flex-grow-1" style="opacity: 1;">
        </div>

        <a href="/oauth2/authorization/google" class="btn btn-light w-100 fw-bold py-2 d-flex align-items-center justify-content-center gap-2 text-decoration-none">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 20px; height: 20px;">
            CONTINUE WITH GOOGLE
        </a>
        
        <div class="text-center mt-4 pt-3" style="border-top: 3px solid var(--border-dark);">
            <p class="small fw-bold mb-0">Already have an account? <a href="/login" class="fw-bold text-decoration-none" style="color: var(--accent-blue);">Sign in here</a></p>
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
