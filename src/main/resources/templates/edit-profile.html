<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Edit Profile - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
</head>
<body class="bg-body">

<div class="container mt-4 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle gap-3">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold text-primary">👤 Edit Profile</h2>
            <p class="text-muted mb-0 small">Update your personal details and avatar.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/events" class="btn btn-primary btn-sm shadow-sm px-3 rounded-pill fw-bold">📅 Events</a>
            <a href="/" class="btn btn-outline-secondary btn-sm shadow-sm px-3 rounded-pill">Dashboard</a>
            <button class="btn btn-dark shadow-sm rounded-circle d-flex align-items-center justify-content-center" id="darkModeToggle" title="Toggle Dark Mode" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3 text-center" role="alert">
                <strong th:text="${success}">Profile updated successfully!</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3 text-center" role="alert">
                <strong th:text="${error}">Error updating profile.</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card shadow-lg border-0 p-4 p-md-5" style="border-radius: 20px;">
                
                <div class="text-center mb-4">
                    <img th:src="${user.profilePhotoUrl != null and !user.profilePhotoUrl.isEmpty() ? user.profilePhotoUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=150'}" 
                         alt="Profile Avatar" 
                         class="rounded-circle shadow object-fit-cover border border-3 border-primary" 
                         style="width: 120px; height: 120px;">
                </div>

                <form th:action="@{/profile/edit}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Full Name</label>
                        <input type="text" class="form-control form-control-lg shadow-sm" name="fullName" th:value="${user.fullName}" required placeholder="Your display name">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email Address</label>
                        <input type="email" class="form-control form-control-lg shadow-sm bg-body-secondary text-muted" name="email" th:value="${user.email}" readonly title="Email cannot be changed directly">
                        <div class="form-text small">Your email address is used for login and cannot be changed here.</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Profile Photo URL</label>
                        <input type="url" class="form-control form-control-lg shadow-sm" name="profilePhotoUrl" th:value="${user.profilePhotoUrl}" placeholder="https://example.com/my-photo.jpg">
                        <div class="form-text small">Paste a link to an image (Imgur, Google Photos, etc.) to update your avatar.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm rounded-pill mt-2">Save Changes</button>
                </form>
                
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    });
</script>

</body>
</html>
