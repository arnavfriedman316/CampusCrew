<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="container px-3">
    <div class="card shadow-lg border-0 mx-auto p-4" style="max-width: 400px; width: 100%; border-radius: 20px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🎓 CampusCrew</h2>
            <p class="text-muted small">Welcome back! Please login to your account.</p>
        </div>
        
        <div th:if="${param.error}" class="alert alert-danger text-center py-2">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert alert-success text-center py-2">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Email address</label>
                <input type="email" class="form-control form-control-lg shadow-sm" name="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" class="form-control form-control-lg shadow-sm" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm">Sign In</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="small text-muted">Don't have an account? <a href="/register" class="fw-bold text-primary text-decoration-none">Register here</a></p>
        </div>
    </div>
</div>

</body>
</html>
