<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Admin Panel - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    <style>
        [data-bs-theme="dark"] .card, [data-bs-theme="dark"] .bg-white { background-color: #2b3035 !important; border-color: #495057 !important; }
        [data-bs-theme="dark"] td, [data-bs-theme="dark"] th { background-color: #2b3035 !important; color: #f8f9fa !important; border-bottom-color: #495057 !important; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-4 mb-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle gap-3">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold text-danger">⚙️ Admin Panel</h2>
            <p class="text-muted mb-0 small">Manage users, roles, clubs, and platform settings.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/" class="btn btn-outline-secondary btn-sm shadow-sm px-3 rounded-pill fw-bold">Dashboard</a>
            <button class="btn btn-dark shadow-sm rounded-circle d-flex align-items-center justify-content-center" id="darkModeToggle" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3 text-center" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3 text-center" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-4">
        
        <div class="card-header bg-danger text-white py-3 d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <span class="fw-bold">👥 User Management</span>
            
            <form th:action="@{/admin}" method="get" class="d-flex w-100" style="max-width: 300px;">
                <input type="text" name="keyword" class="form-control form-control-sm rounded-start-pill border-0 shadow-none" placeholder="Search name or email..." th:value="${keyword}">
                <button type="submit" class="btn btn-light btn-sm rounded-end-pill fw-bold text-danger">Search</button>
            </form>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead class="table-light">
                    <tr>
                        <th class="px-3 py-3">User</th>
                        <th class="py-3">Email</th>
                        <th class="py-3">Assign Role & Club</th>
                        <th class="px-3 py-3 text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        
                        <td class="px-3 py-3">
                            <div class="d-flex align-items-center gap-2">
                                <img th:src="${user.profilePhotoUrl != null and !user.profilePhotoUrl.isEmpty() ? user.profilePhotoUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=40'}" 
                                     class="rounded-circle shadow-sm object-fit-cover" style="width: 40px; height: 40px;" alt="Avatar">
                                <div>
                                    <span class="fw-bold d-block" th:text="${user.fullName}">Name</span>
                                    <span th:if="${user.email == 'admin316@campuscrew.com'}" class="badge bg-dark text-warning border border-warning" style="font-size: 0.65rem;">👑 ROOT ADMIN</span>
                                </div>
                            </div>
                        </td>
                        
                        <td class="text-secondary small" th:text="${user.email}">email@student.edu</td>
                        
                        <td>
                            <form th:unless="${user.email == 'admin316@campuscrew.com' or (user.role == 'ROLE_SUPER_ADMIN' and #authentication.name != 'admin316@campuscrew.com')}" 
                                  th:action="@{/admin/update-role}" method="post" class="d-flex flex-wrap align-items-center gap-2 m-0">
                                
                                <input type="hidden" name="userId" th:value="${user.id}">
                                
                                <select name="newRole" class="form-select form-select-sm shadow-sm" style="max-width: 140px;">
                                    <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">🎓 Student</option>
                                    <option value="ROLE_PRESIDENT" th:selected="${user.role == 'ROLE_PRESIDENT'}">👑 President</option>
                                    <option value="ROLE_SUPER_ADMIN" th:selected="${user.role == 'ROLE_SUPER_ADMIN'}">⚙️ Super Admin</option>
                                </select>
                                
                                <select name="managedClubId" class="form-select form-select-sm shadow-sm" style="max-width: 140px;">
                                    <option value="">-- No Club --</option>
                                    <option th:each="club : ${clubs}" 
                                            th:value="${club.id}" 
                                            th:text="${club.name}"
                                            th:selected="${user.managedClub != null and user.managedClub.id == club.id}">
                                        Club Name
                                    </option>
                                </select>
                                
                                <button type="submit" class="btn btn-sm btn-primary fw-bold shadow-sm px-3">Save</button>
                            </form>

                            <div th:if="${user.email == 'admin316@campuscrew.com' or (user.role == 'ROLE_SUPER_ADMIN' and #authentication.name != 'admin316@campuscrew.com')}">
                                <span class="badge bg-danger rounded-pill px-3 py-2" th:text="${user.role == 'ROLE_SUPER_ADMIN' ? '⚙️ Super Admin' : '🛡️ Protected'}">Badge</span>
                            </div>
                        </td>
                        
                        <td class="px-3 text-end">
                            <form th:unless="${user.email == 'admin316@campuscrew.com' or (user.role == 'ROLE_SUPER_ADMIN' and #authentication.name != 'admin316@campuscrew.com')}" 
                                  th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="m-0" onsubmit="return confirm('⚠️ Are you sure you want to completely delete this user? This cannot be undone.');">
                                <button type="submit" class="btn btn-sm btn-outline-danger fw-bold rounded shadow-sm">Delete</button>
                            </form>
                        </td>
                        
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
            }
        }
    });
</script>
</body>
</html>
