<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Admin Panel - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body class="bg-body">

<div class="container mt-4 mb-5">
    <div class="bento-grid">
        <!-- Header Block -->
        <div class="bento-item span-4 d-flex justify-content-between align-items-center" style="background-color: var(--accent-red) !important; color: white !important;">
            <div class="text-start">
                <h2 class="m-0 fw-bold" style="color: white !important;">⚙️ ADMIN PANEL</h2>
                <p class="mb-0 fw-bold" style="opacity: 0.9;">Manage users, roles, clubs, and platform settings.</p>
            </div>
            
            <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
                <a href="/" class="btn btn-light fw-bold py-2 px-4 shadow-none">DASHBOARD &rarr;</a>
                <button class="btn btn-dark shadow-none d-flex align-items-center justify-content-center" id="darkModeToggle" title="Toggle Dark Mode" style="width: 50px; height: 50px; font-size: 1.2rem;">🌙</button>
            </div>
        </div>

        <!-- Alerts -->
        <div class="bento-item span-4 py-3 bg-success text-dark" th:if="${success}" style="background-color: var(--accent-green) !important;">
            <div class="d-flex justify-content-between align-items-center">
                <strong th:text="${success}">Success!</strong>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
        <div class="bento-item span-4 py-3 bg-danger text-white" th:if="${error}" style="background-color: var(--accent-red) !important;">
            <div class="d-flex justify-content-between align-items-center">
                <strong th:text="${error}">Error!</strong>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <!-- Management Table Block -->
        <div class="bento-item span-4 p-0 overflow-hidden" style="display: flex; flex-direction: column;">
            
            <div class="p-3 d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 border-bottom" style="border-color: var(--border-dark) !important; background-color: var(--bg-cream);">
                <span class="fw-bold fs-4" style="font-family: 'Syne', sans-serif;">👥 USER MANAGEMENT</span>
                
                <form th:action="@{/admin}" method="get" class="d-flex w-100 m-0" style="max-width: 300px; border: 2px solid var(--border-dark);">
                    <input type="text" name="keyword" class="form-control border-0 shadow-none rounded-0 px-3 py-2" placeholder="Search name or email..." th:value="${keyword}" style="background-color: var(--bg-cream); color: var(--border-dark);">
                    <button type="submit" class="btn btn-dark rounded-0 fw-bold px-3 border-0 border-start" style="border-color: var(--border-dark) !important;">SEARCH</button>
                </form>
            </div>
            
            <div class="table-responsive bg-transparent">
                <table class="table align-middle mb-0" style="--bs-table-bg: transparent; --bs-table-color: inherit; border-color: var(--border-dark);">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-dark);">
                            <th class="px-4 py-3 fw-bold text-uppercase">User</th>
                            <th class="py-3 fw-bold text-uppercase">Email</th>
                            <th class="py-3 fw-bold text-uppercase">Assign Role & Club</th>
                            <th class="px-4 py-3 text-end fw-bold text-uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}" style="border-bottom: 1px solid var(--border-dark);">
                            
                            <td class="px-4 py-3">
                                <div class="d-flex align-items-center gap-3">
                                    <div style="border: 2px solid var(--border-dark); padding: 2px;">
                                        <img th:src="${user.profilePhotoUrl != null and !user.profilePhotoUrl.isEmpty() ? user.profilePhotoUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=40'}" 
                                             class="object-fit-cover block" style="width: 40px; height: 40px;" alt="Avatar">
                                    </div>
                                    <div>
                                        <span class="fw-bold d-block" style="font-size: 1.1rem;" th:text="${user.fullName}">Name</span>
                                        <span th:if="${user.email == 'admin316@campuscrew.com'}" class="badge bg-dark text-warning border border-warning rounded-0 border-2 mt-1" style="font-size: 0.65rem;">👑 ROOT ADMIN</span>
                                    </div>
                                </div>
                            </td>
                            
                            <td th:text="${user.email}" style="font-weight: 500;">email@student.edu</td>
                            
                            <td>
                                <form th:unless="${user.email == 'admin316@campuscrew.com' or (user.role == 'ROLE_SUPER_ADMIN' and #authentication.name != 'admin316@campuscrew.com')}" 
                                      th:action="@{/admin/update-role}" method="post" class="d-flex flex-wrap align-items-center gap-2 m-0">
                                    
                                    <input type="hidden" name="userId" th:value="${user.id}">
                                    
                                    <select name="newRole" class="form-select shadow-none rounded-0 border-2 fw-bold" style="max-width: 150px; border-color: var(--border-dark); background-color: var(--bg-cream); color: var(--border-dark);">
                                        <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">🎓 Student</option>
                                        <option value="ROLE_PRESIDENT" th:selected="${user.role == 'ROLE_PRESIDENT'}">👑 President</option>
                                        <option value="ROLE_SUPER_ADMIN" th:selected="${user.role == 'ROLE_SUPER_ADMIN'}">⚙️ Super Admin</option>
                                    </select>
                                    
                                    <select name="managedClubId" class="form-select shadow-none rounded-0 border-2 fw-bold" style="max-width: 150px; border-color: var(--border-dark); background-color: var(--bg-cream); color: var(--border-dark);">
                                        <option value="">-- No Club --</option>
                                        <option th:each="club : ${clubs}" 
                                                th:value="${club.id}" 
                                                th:text="${club.name}"
                                                th:selected="${user.managedClub != null and user.managedClub.id == club.id}">
                                            Club Name
                                        </option>
                                    </select>
                                    
                                    <button type="submit" class="btn btn-primary fw-bold shadow-none rounded-0 px-3" style="border: 2px solid var(--border-dark); border-bottom-width: 4px; border-right-width: 4px;">SAVE</button>
                                </form>
    
                                <div th:if="${user.email == 'admin316@campuscrew.com' or (user.role == 'ROLE_SUPER_ADMIN' and #authentication.name != 'admin316@campuscrew.com')}">
                                    <span class="badge bg-danger rounded-0 px-3 py-2 fw-bold border" style="border-color: var(--border-dark) !important;" th:text="${user.role == 'ROLE_SUPER_ADMIN' ? '⚙️ SUPER ADMIN' : '🛡️ PROTECTED'}">Badge</span>
                                </div>
                            </td>
                            
                            <td class="px-4 text-end">
                                <form th:unless="${user.email == 'admin316@campuscrew.com' or (user.role == 'ROLE_SUPER_ADMIN' and #authentication.name != 'admin316@campuscrew.com')}" 
                                      th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="m-0" onsubmit="return confirm('⚠️ Are you sure you want to completely delete this user? This cannot be undone.');">
                                    <button type="submit" class="btn btn-outline-danger fw-bold rounded-0 shadow-none px-3" style="border-width: 2px;">DELETE</button>
                                </form>
                            </td>
                            
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        updateButtonStyle(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            updateButtonStyle(newTheme);
        });

        function updateButtonStyle(theme) {
            if (theme === 'dark') {
                themeToggleBtn.classList.replace('btn-dark', 'btn-light');
            } else {
                themeToggleBtn.classList.replace('btn-light', 'btn-dark');
            }
        }
    });
</script>
</body>
</html>
