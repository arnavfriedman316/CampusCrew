<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Admin Panel - CampusCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    
    <style>
        [data-bs-theme="dark"] .card { background-color: #2b3035; border-color: #495057 !important; }
        /* Ensures the table looks good in dark mode */
        [data-bs-theme="dark"] .table { --bs-table-bg: transparent; --bs-table-color: #f8f9fa; border-color: #495057; }
        [data-bs-theme="dark"] .table-hover>tbody>tr:hover>* { --bs-table-bg-state: rgba(255,255,255,0.05); color: #fff; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container mt-4 mb-5">
    
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle gap-3">
        <div class="text-center text-md-start">
            <h2 class="m-0 fw-bold text-danger">⚙️ Admin Panel</h2>
            <p class="text-muted mb-0 small">Manage users and platform access.</p>
        </div>
        
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
            <a href="/clubs" class="btn btn-warning btn-sm shadow-sm px-3 rounded-pill fw-bold text-dark">🛡️ Manage Clubs</a>
            <a href="/" class="btn btn-outline-secondary btn-sm shadow-sm px-3 rounded-pill">Dashboard</a>
            <button class="btn btn-dark shadow-sm rounded-circle d-flex align-items-center justify-content-center" id="darkModeToggle" title="Toggle Dark Mode" style="width: 36px; height: 36px;">🌙</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${success}">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <strong th:text="${error}">Error!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
        
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-nowrap">
                <thead class="table-dark">
                    <tr>
                        <th class="px-4 py-3">ID</th>
                        <th class="py-3">User</th>
                        <th class="py-3">Email</th>
                        <th class="py-3">Role</th>
                        <th class="px-4 py-3 text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${users == null or users.empty}">
                        <td colspan="5" class="text-center py-5 text-muted fw-bold">No users found in the system.</td>
                    </tr>
                    
                    <tr th:each="user : ${users}">
                        <td class="px-4 fw-bold text-secondary" th:text="${user.id}">1</td>
                        
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${user.profilePhotoUrl != null ? user.profilePhotoUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random'}" 
                                     alt="Avatar" class="rounded-circle me-2 object-fit-cover shadow-sm" style="width: 35px; height: 35px;">
                                <span class="fw-bold" th:text="${user.fullName}">User Name</span>
                            </div>
                        </td>
                        
                        <td class="text-secondary small" th:text="${user.email}">user@email.com</td>
                        
                        <td>
                            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-flex gap-2 m-0 align-items-center">
                                <select class="form-select form-select-sm shadow-sm" name="role" style="min-width: 140px;">
                                    <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">User</option>
                                    <option value="ROLE_PRESIDENT" th:selected="${user.role == 'ROLE_PRESIDENT'}">President</option>
                                    <option value="ROLE_SUPER_ADMIN" th:selected="${user.role == 'ROLE_SUPER_ADMIN'}">Super Admin</option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-sm fw-bold rounded px-3 shadow-sm">Save</button>
                            </form>
                        </td>
                        
                        <td class="px-4 text-end">
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="m-0" onsubmit="return confirm('WARNING: Are you sure you want to delete this user? This action cannot be undone.');">
                                <button type="submit" class="btn btn-danger btn-sm fw-bold rounded shadow-sm px-3">
                                    🗑️ Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('darkModeToggle');
        const currentTheme = htmlElement.getAttribute('data-bs-theme') || 'light';
        
        themeToggleBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggleBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    });
</script>

</body>
</html>
